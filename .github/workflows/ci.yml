name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install geoip2 scapy pytest

      - name: Syntax check
        run: python -m py_compile argonet.py

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Verify --version flag
        run: python argonet.py --version

      - name: Verify --help flag
        run: python argonet.py --help

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install .

      - name: Verify entry point works
        run: argonet --version

      - name: Verify help
        run: argonet --help

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install geoip2 scapy mypy types-geoip2

      - name: Run mypy
        run: mypy core/ argonet.py
